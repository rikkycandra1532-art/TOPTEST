<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TopMarket — Belanja Kebutuhan Harian Kota Anda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<style>
/* =========================================================
   TopMarket — style.css
   Struktur file (cari pakai Ctrl+F):
   1. Design Tokens (variabel warna, font, radius, shadow)
   2. Reset & Base
   3. Layout & Utilities
   4. Komponen: Header, Buttons, Badge, Card Produk
   5. Komponen: Hero, Section, Kategori
   6. Komponen: Footer, Toast
   7. Halaman: Produk & Filter
   8. Halaman: Detail Produk
   9. Halaman: Cart & Checkout
   10. Halaman: Tentang & Kontak
   11. Responsive (mobile-first, breakpoint di bagian bawah tiap blok)
   ========================================================= */

/* ---------- 1. Design Tokens ---------- */
:root {
  /* Warna utama */
  --color-white: #ffffff;
  --color-green: #22c55e;
  --color-green-dark: #16a34a;
  --color-green-light: #ecfdf5;
  --color-green-soft: #dcfce7;

  --color-gray-50: #f9fafb;
  --color-gray-100: #f3f4f6;
  --color-gray-200: #e5e7eb;
  --color-gray-300: #d1d5db;
  --color-gray-400: #9ca3af;
  --color-gray-600: #6b7280;
  --color-black: #111827;

  --color-danger: #dc2626;

  /* Tipografi */
  --font-display: "Poppins", "Inter", sans-serif;
  --font-body: "Inter", sans-serif;

  /* Radius & Shadow */
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-full: 999px;

  --shadow-sm: 0 1px 2px rgba(17, 24, 39, 0.05);
  --shadow-md: 0 6px 16px rgba(17, 24, 39, 0.08);
  --shadow-lg: 0 16px 40px rgba(17, 24, 39, 0.12);

  /* Layout */
  --container-width: 1200px;
  --header-height: 72px;
  --transition: 0.2s ease;
}

/* ---------- 2. Reset & Base ---------- */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: var(--font-body);
  color: var(--color-black);
  background: var(--color-white);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

img {
  max-width: 100%;
  display: block;
}

a {
  color: inherit;
  text-decoration: none;
}

ul {
  list-style: none;
}

button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  background: none;
}

input,
select,
textarea {
  font-family: inherit;
  font-size: 1rem;
}

h1, h2, h3, h4 {
  font-family: var(--font-display);
  font-weight: 600;
  line-height: 1.25;
  color: var(--color-black);
}

:focus-visible {
  outline: 2px solid var(--color-green-dark);
  outline-offset: 2px;
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
}

/* ---------- 3. Layout & Utilities ---------- */
.container {
  width: 100%;
  max-width: var(--container-width);
  margin: 0 auto;
  padding: 0 20px;
}

.section {
  padding: 48px 0;
}

.section-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 24px;
}

.section-head .eyebrow {
  display: block;
  font-size: 0.8125rem;
  font-weight: 600;
  color: var(--color-green-dark);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 4px;
}

.section-head h2 {
  font-size: 1.5rem;
}

.link-more {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--color-green-dark);
  white-space: nowrap;
  transition: opacity var(--transition);
}
.link-more:hover { opacity: 0.7; }

.text-muted { color: var(--color-gray-600); }
.text-center { text-align: center; }
.mt-8 { margin-top: 8px; }
.mt-16 { margin-top: 16px; }
.mt-24 { margin-top: 24px; }
.mt-32 { margin-top: 32px; }

.grid-products {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}

.fade-in {
  animation: fadeIn 0.4s ease both;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.empty-state {
  text-align: center;
  padding: 64px 16px;
  color: var(--color-gray-600);
}
.empty-state .empty-icon { font-size: 3rem; margin-bottom: 12px; }

@media (min-width: 640px) {
  .grid-products { grid-template-columns: repeat(3, 1fr); }
}
@media (min-width: 1024px) {
  .container { padding: 0 32px; }
  .section { padding: 64px 0; }
  .grid-products { grid-template-columns: repeat(4, 1fr); gap: 20px; }
}

/* ---------- 4. Buttons, Badge, Product Card ---------- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 24px;
  border-radius: var(--radius-full);
  font-weight: 600;
  font-size: 0.95rem;
  transition: transform var(--transition), background var(--transition), box-shadow var(--transition);
  white-space: nowrap;
}
.btn:active { transform: scale(0.97); }

.btn-primary {
  background: var(--color-green);
  color: var(--color-white);
  box-shadow: var(--shadow-sm);
}
.btn-primary:hover { background: var(--color-green-dark); box-shadow: var(--shadow-md); }

.btn-outline {
  background: var(--color-white);
  color: var(--color-black);
  border: 1.5px solid var(--color-gray-200);
}
.btn-outline:hover { border-color: var(--color-green); color: var(--color-green-dark); }

.btn-dark {
  background: var(--color-black);
  color: var(--color-white);
}
.btn-dark:hover { background: #000; }

.btn-block { width: 100%; }
.btn-sm { padding: 8px 16px; font-size: 0.85rem; }

.btn-icon {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: var(--color-gray-50);
  transition: background var(--transition);
  position: relative;
}
.btn-icon:hover { background: var(--color-gray-100); }

.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: var(--radius-full);
  font-size: 0.75rem;
  font-weight: 600;
}
.badge-discount { background: var(--color-black); color: var(--color-white); }
.badge-new { background: var(--color-green); color: var(--color-white); }
.badge-out { background: var(--color-gray-200); color: var(--color-gray-600); }

.cart-count {
  position: absolute;
  top: -2px;
  right: -2px;
  min-width: 18px;
  height: 18px;
  padding: 0 4px;
  background: var(--color-green);
  color: var(--color-white);
  border-radius: var(--radius-full);
  font-size: 0.65rem;
  font-weight: 700;
  align-items: center;
  justify-content: center;
  display: none;
}

.product-card {
  background: var(--color-white);
  border: 1px solid var(--color-gray-100);
  border-radius: var(--radius-md);
  overflow: hidden;
  transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
  display: flex;
  flex-direction: column;
  height: 100%;
}
.product-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-md);
  border-color: var(--color-gray-200);
}

.product-card__media {
  position: relative;
  aspect-ratio: 1 / 1;
  overflow: hidden;
  background: var(--color-gray-50);
}
.product-card__media img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.35s ease;
}
.product-card:hover .product-card__media img { transform: scale(1.06); }

.product-card__badges {
  position: absolute;
  top: 10px;
  left: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.product-card__wish {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.9);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.95rem;
  transition: transform var(--transition);
}
.product-card__wish:hover { transform: scale(1.1); }

.product-card__body {
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex: 1;
}

.product-card__cat {
  font-size: 0.7rem;
  color: var(--color-gray-400);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.product-card__name {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--color-black);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  min-height: 2.6em;
}

.product-card__rating {
  font-size: 0.78rem;
  color: var(--color-gray-600);
  display: flex;
  align-items: center;
  gap: 4px;
}

.product-card__price {
  margin-top: auto;
  display: flex;
  align-items: baseline;
  gap: 6px;
  flex-wrap: wrap;
}
.product-card__price .final { font-weight: 700; color: var(--color-black); }
.product-card__price .original {
  font-size: 0.78rem;
  color: var(--color-gray-400);
  text-decoration: line-through;
}

.product-card__stock {
  font-size: 0.75rem;
  color: var(--color-gray-400);
}
.product-card__stock.low { color: var(--color-danger); }

.product-card__add {
  margin-top: 8px;
  width: 100%;
  padding: 9px;
  border-radius: var(--radius-sm);
  background: var(--color-green-light);
  color: var(--color-green-dark);
  font-weight: 600;
  font-size: 0.85rem;
  transition: background var(--transition), color var(--transition);
}
.product-card__add:hover:not(:disabled) { background: var(--color-green); color: var(--color-white); }
.product-card__add:disabled { background: var(--color-gray-100); color: var(--color-gray-400); cursor: not-allowed; }

/* ---------- Header ---------- */
.site-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(255, 255, 255, 0.92);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--color-gray-100);
}

.header-inner {
  height: var(--header-height);
  display: flex;
  align-items: center;
  gap: 16px;
}

.logo {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.25rem;
  color: var(--color-black);
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.logo span { color: var(--color-green); }

.search-bar {
  flex: 1;
  display: none;
  align-items: center;
  background: var(--color-gray-50);
  border: 1px solid var(--color-gray-100);
  border-radius: var(--radius-full);
  padding: 0 6px 0 16px;
  transition: border-color var(--transition);
  max-width: 480px;
}
.search-bar:focus-within { border-color: var(--color-green); }
.search-bar input {
  flex: 1;
  border: none;
  background: none;
  padding: 10px 8px;
  font-size: 0.9rem;
}
.search-bar input:focus { outline: none; }
.search-bar button {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--color-gray-600);
}

.main-nav {
  display: none;
  gap: 24px;
}
.main-nav a {
  font-size: 0.92rem;
  font-weight: 500;
  color: var(--color-gray-600);
  transition: color var(--transition);
  position: relative;
}
.main-nav a:hover, .main-nav a.active { color: var(--color-black); }
.main-nav a.active::after {
  content: "";
  position: absolute;
  left: 0; right: 0; bottom: -20px;
  height: 2px;
  background: var(--color-green);
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}
.header-actions > a.btn,
.header-actions > .btn {
  display: none;
}
@media (min-width: 480px) {
  .header-actions > a.btn,
  .header-actions > .btn {
    display: inline-flex;
  }
}

.mobile-search-toggle,
.mobile-menu-toggle {
  display: flex;
}
@media (min-width: 640px) {
  .mobile-search-toggle { display: none; }
}

.mobile-search {
  display: none;
  padding: 0 0 14px;
}
.mobile-search.is-open { display: block; }
.mobile-search .search-bar { display: flex; max-width: none; }

@media (min-width: 640px) {
  .search-bar { display: flex; }
}

@media (min-width: 1024px) {
  .main-nav { display: flex; }
  .mobile-menu-toggle { display: none; }
}

/* Mobile drawer menu */
.mobile-drawer {
  position: fixed;
  inset: 0;
  z-index: 200;
  visibility: hidden;
}
.mobile-drawer.is-open { visibility: visible; }
.mobile-drawer__overlay {
  position: absolute;
  inset: 0;
  background: rgba(17, 24, 39, 0.4);
  opacity: 0;
  transition: opacity var(--transition);
}
.mobile-drawer.is-open .mobile-drawer__overlay { opacity: 1; }
.mobile-drawer__panel {
  position: absolute;
  top: 0; right: 0;
  height: 100%;
  width: 78%;
  max-width: 300px;
  background: var(--color-white);
  box-shadow: var(--shadow-lg);
  padding: 20px;
  transform: translateX(100%);
  transition: transform 0.25s ease;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.mobile-drawer.is-open .mobile-drawer__panel { transform: translateX(0); }
.mobile-drawer__panel a {
  padding: 14px 4px;
  font-weight: 500;
  border-bottom: 1px solid var(--color-gray-100);
}
.mobile-drawer__close {
  align-self: flex-end;
  font-size: 1.4rem;
  margin-bottom: 8px;
}

/* ---------- 5. Hero, Kategori ---------- */
.hero {
  position: relative;
  overflow: hidden;
  background: var(--color-green-light);
  border-radius: 0 0 var(--radius-lg) var(--radius-lg);
}
.hero::before {
  content: "";
  position: absolute;
  width: 420px;
  height: 420px;
  right: -140px;
  top: -160px;
  background: var(--color-green-soft);
  border-radius: 50%;
}
.hero::after {
  content: "";
  position: absolute;
  width: 260px;
  height: 260px;
  left: -100px;
  bottom: -120px;
  background: rgba(34, 197, 94, 0.12);
  border-radius: 50%;
}
.hero-inner {
  position: relative;
  padding: 40px 0 48px;
  text-align: center;
}
.hero-badge {
  display: inline-block;
  background: var(--color-white);
  color: var(--color-green-dark);
  font-size: 0.78rem;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: var(--radius-full);
  margin-bottom: 16px;
  box-shadow: var(--shadow-sm);
}
.hero h1 {
  font-size: 1.9rem;
  max-width: 640px;
  margin: 0 auto 12px;
}
.hero p {
  color: var(--color-gray-600);
  max-width: 480px;
  margin: 0 auto 24px;
}
.hero-actions {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}
.hero-search {
  width: 100%;
  max-width: 520px;
  display: flex;
  background: var(--color-white);
  border-radius: var(--radius-full);
  box-shadow: var(--shadow-md);
  padding: 6px;
}
.hero-search input {
  flex: 1;
  border: none;
  padding: 12px 16px;
  font-size: 0.95rem;
}
.hero-search input:focus { outline: none; }

@media (min-width: 768px) {
  .hero-inner { padding: 64px 0 80px; }
  .hero h1 { font-size: 2.75rem; }
  .hero-actions { flex-direction: row; justify-content: center; }
}

.category-scroll {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding: 20px 20px 4px;
  margin: 0 -20px;
  scrollbar-width: none;
}
.category-scroll::-webkit-scrollbar { display: none; }
.category-chip {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  width: 88px;
  text-align: center;
}
.category-chip__icon {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--color-gray-50);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  transition: background var(--transition), transform var(--transition);
}
.category-chip:hover .category-chip__icon {
  background: var(--color-green-soft);
  transform: translateY(-2px);
}
.category-chip span:last-child {
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--color-gray-600);
}
@media (min-width: 1024px) {
  .container .category-scroll { margin: 0; padding: 20px 0 4px; justify-content: center; flex-wrap: wrap; overflow: visible; }
}

.promo-banner {
  background: var(--color-black);
  color: var(--color-white);
  border-radius: var(--radius-lg);
  padding: 28px 24px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: flex-start;
}
.promo-banner h3 { color: var(--color-white); font-size: 1.3rem; }
.promo-banner p { color: var(--color-gray-300); }

.feature-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}
.feature-card {
  background: var(--color-gray-50);
  border-radius: var(--radius-md);
  padding: 20px 16px;
  text-align: center;
}
.feature-card__icon { font-size: 1.8rem; margin-bottom: 8px; }
.feature-card h4 { font-size: 0.95rem; margin-bottom: 4px; }
.feature-card p { font-size: 0.82rem; color: var(--color-gray-600); }
@media (min-width: 768px) {
  .feature-grid { grid-template-columns: repeat(4, 1fr); }
}

.brand-row {
  display: flex;
  gap: 14px;
  overflow-x: auto;
  padding-bottom: 4px;
}
.brand-chip {
  flex-shrink: 0;
  padding: 14px 26px;
  background: var(--color-gray-50);
  border-radius: var(--radius-md);
  font-weight: 600;
  color: var(--color-gray-600);
  font-size: 0.9rem;
}

/* ---------- 6. Footer & Toast ---------- */
.site-footer {
  background: var(--color-gray-50);
  border-top: 1px solid var(--color-gray-100);
  margin-top: 48px;
}
.footer-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 32px;
  padding: 48px 0 24px;
}
.footer-col h5 {
  font-family: var(--font-display);
  font-size: 0.95rem;
  margin-bottom: 14px;
}
.footer-col p, .footer-col li { color: var(--color-gray-600); font-size: 0.88rem; }
.footer-col li { margin-bottom: 8px; }
.footer-col a:hover { color: var(--color-green-dark); }
.footer-social { display: flex; gap: 10px; margin-top: 8px; }
.footer-social a {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--color-white);
  border: 1px solid var(--color-gray-200);
  display: flex; align-items: center; justify-content: center;
  transition: border-color var(--transition), color var(--transition);
}
.footer-social a:hover { border-color: var(--color-green); color: var(--color-green-dark); }
.footer-bottom {
  border-top: 1px solid var(--color-gray-200);
  padding: 18px 0;
  text-align: center;
  font-size: 0.82rem;
  color: var(--color-gray-400);
}
@media (min-width: 768px) {
  .footer-grid { grid-template-columns: repeat(4, 1fr); }
}

.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translate(-50%, 20px);
  background: var(--color-black);
  color: var(--color-white);
  padding: 12px 20px;
  border-radius: var(--radius-full);
  font-size: 0.88rem;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease, transform 0.25s ease;
  z-index: 300;
  max-width: 90%;
  text-align: center;
}
.toast--show {
  opacity: 1;
  transform: translate(-50%, 0);
}

/* ---------- 7. Halaman Produk & Filter ---------- */
.breadcrumb {
  font-size: 0.85rem;
  color: var(--color-gray-400);
  padding: 16px 0;
}
.breadcrumb a:hover { color: var(--color-green-dark); }
.breadcrumb .current { color: var(--color-black); font-weight: 500; }

.products-layout {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
  align-items: start;
}
.filter-panel {
  background: var(--color-gray-50);
  border-radius: var(--radius-md);
  padding: 20px;
}
.filter-panel h4 { font-size: 0.95rem; margin-bottom: 14px; }
.filter-group { margin-bottom: 20px; }
.filter-group:last-child { margin-bottom: 0; }
.filter-option {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  font-size: 0.88rem;
  color: var(--color-gray-600);
}
.filter-option input { accent-color: var(--color-green); width: 16px; height: 16px; }

.toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.toolbar select {
  padding: 8px 12px;

const BRANDS = ["Indofood", "Unilever", "Nestle", "Wings", "Ultra", "Sania", "ABC", "Sasa"];

/** Utilitas kecil untuk format Rupiah */
function formatRupiah(num) {
  return "Rp" + Math.round(num).toLocaleString("id-ID");
}

function getFinalPrice(product) {
  if (!product.discount) return product.price;
  return product.price - (product.price * product.discount) / 100;
}

function getProductById(id) {
  return PRODUCTS.find((p) => p.id === Number(id));
}


/**
 * cart-memory.js
 * Versi keranjang untuk PREVIEW satu-file (SPA).
 * Disimpan di variabel JS (bukan localStorage), karena preview di dalam
 * chat berjalan di sandbox yang memblokir browser storage. Karena semua
 * "halaman" ada di satu file yang sama (SPA, tidak pernah reload),
 * datanya tetap aman selama sesi berlangsung.
 *
 * Untuk versi yang di-deploy sendiri (multi-halaman), lihat folder
 * project lengkap yang memakai localStorage di js/cart.js.
 */

let cartState = [];
let wishlistState = new Set();

function getCart() {
  return cartState;
}

function addToCart(productId, qty = 1) {
  const existing = cartState.find((item) => item.id === productId);
  if (existing) {
    existing.qty += qty;
  } else {
    cartState.push({ id: productId, qty });
  }
  updateCartBadge();
  const product = getProductById(productId);
  if (product) showToast(`${product.name} ditambahkan ke keranjang`);
}

function removeFromCart(productId) {
  cartState = cartState.filter((item) => item.id !== productId);
  updateCartBadge();
}

function updateCartQty(productId, qty) {
  if (qty <= 0) {
    cartState = cartState.filter((item) => item.id !== productId);
  } else {
    const item = cartState.find((i) => i.id === productId);
    if (item) item.qty = qty;
  }
  updateCartBadge();
}

function getCartDetailed() {
  return cartState
    .map((item) => {
      const product = getProductById(item.id);
      if (!product) return null;
      const finalPrice = getFinalPrice(product);
      return { ...product, qty: item.qty, finalPrice, subtotal: finalPrice * item.qty };
    })
    .filter(Boolean);
}

function getCartCount() {
  return cartState.reduce((sum, item) => sum + item.qty, 0);
}

function getCartTotal() {
  return getCartDetailed().reduce((sum, item) => sum + item.subtotal, 0);
}

function clearCart() {
  cartState = [];
  updateCartBadge();
}

function updateCartBadge() {
  const count = getCartCount();
  document.querySelectorAll("[data-cart-badge]").forEach((el) => {
    el.textContent = count;
    el.style.display = count > 0 ? "flex" : "none";
  });
}

function isInWishlist(id) {
  return wishlistState.has(id);
}
function toggleWishlist(id) {
  if (wishlistState.has(id)) {
    wishlistState.delete(id);
  } else {
    wishlistState.add(id);
    showToast("Ditambahkan ke wishlist");
  }
  updateWishlistBadge();
}
function updateWishlistBadge() {
  const count = wishlistState.size;
  document.querySelectorAll("[data-wishlist-badge]").forEach((el) => {
    el.textContent = count;
    el.style.display = count > 0 ? "flex" : "none";
  });
}

let toastTimeout;
function showToast(message) {
  let toast = document.getElementById("toast");
  toast.textContent = message;
  toast.classList.add("toast--show");
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => toast.classList.remove("toast--show"), 2200);
}

function categoryName(id) {
  const cat = CATEGORIES.find((c) => c.id === id);
  return cat ? cat.name : id;
}

/* ===================== Kartu Produk ===================== */
function productCardHTML(p) {
  const finalPrice = getFinalPrice(p);
  const outOfStock = p.stock <= 0;
  const wished = isInWishlist(p.id);
  return `
    <article class="product-card fade-in">
      <div class="product-card__media">
        <a href="#/produk-detail?id=${p.id}" tabindex="-1">
          <img src="${p.image}" alt="${p.name}" loading="lazy" width="500" height="500">
        </a>
        <div class="product-card__badges">
          ${p.discount ? `<span class="badge badge-discount">-${p.discount}%</span>` : ""}
          ${p.isNew ? `<span class="badge badge-new">Baru</span>` : ""}
        </div>
        <button class="product-card__wish" data-wishlist-toggle="${p.id}" aria-label="Wishlist">${wished ? "❤️" : "🤍"}</button>
      </div>
      <div class="product-card__body">
        <span class="product-card__cat">${categoryName(p.category)}</span>
        <a href="#/produk-detail?id=${p.id}" class="product-card__name">${p.name}</a>
        <div class="product-card__rating">⭐ ${p.rating.toFixed(1)} <span class="text-muted">· Terjual ${p.sold}</span></div>
        <div class="product-card__price">
          <span class="final">${formatRupiah(finalPrice)}</span>
          ${p.discount ? `<span class="original">${formatRupiah(p.price)}</span>` : ""}
        </div>
        <span class="product-card__stock ${p.stock > 0 && p.stock <= 5 ? "low" : ""}">${outOfStock ? "Stok habis" : `Stok: ${p.stock}`}</span>
        <button class="product-card__add" data-add-to-cart="${p.id}" ${outOfStock ? "disabled" : ""}>
          ${outOfStock ? "Stok Habis" : "+ Keranjang"}
        </button>
      </div>
    </article>`;
}

function renderProductGrid(selector, products) {
  const el = qs(selector);

  el.innerHTML = products.length

function afterRenderProduk(params) {
  const state = {
    search: params.get("search") || "",
    categories: params.get("category") ? [params.get("category")] : [],
    sort: "terbaru",
    visibleCount: 8,
  };

  qs("#produkSearchInput").value = state.search;
  qs("#categoryFilters").innerHTML = CATEGORIES.map(
    (c) => `<label class="filter-option"><input type="checkbox" value="${c.id}" ${state.categories.includes(c.id) ? "checked" : ""}> ${c.icon} ${c.name}</label>`
  ).join("");

  function getFiltered() {
    let list = [...PRODUCTS];
    if (state.search) {
      const q = state.search.toLowerCase();
      list = list.filter((p) => p.name.toLowerCase().includes(q));
    }
    if (state.categories.length) list = list.filter((p) => state.categories.includes(p.category));
    switch (state.sort) {
      case "termurah": list.sort((a, b) => getFinalPrice(a) - getFinalPrice(b)); break;
      case "termahal": list.sort((a, b) => getFinalPrice(b) - getFinalPrice(a)); break;
      case "rating": list.sort((a, b) => b.rating - a.rating); break;
      default: list.sort((a, b) => b.id - a.id);
    }
    return list;
  }

  function render() {
    const filtered = getFiltered();
    renderProductGrid("#produkGrid", filtered.slice(0, state.visibleCount));
    qs("#produkCount").textContent = `${filtered.length} produk ditemukan`;
    qs("#loadMoreBtn").style.display = state.visibleCount < filtered.length ? "inline-flex" : "none";
  }

  qs("#produkSearchInput").addEventListener("input", (e) => { state.search = e.target.value; state.visibleCount = 8; render(); });
  qs("#categoryFilters").addEventListener("change", () => {
    state.categories = qsa('#categoryFilters input[type="checkbox"]:checked').map((i) => i.value);
    state.visibleCount = 8;
    render();
  });
  qs("#sortSelect").addEventListener("change", (e) => { state.sort = e.target.value; render(); });
  qs("#loadMoreBtn").addEventListener("click", () => { state.visibleCount += 8; render(); });

  render();
}

function afterRenderDetail(params) {
  const product = getProductById(params.get("id"));
  const wrap = qs("#productDetailWrap");
  if (!product) {
    wrap.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><p>Produk tidak ditemukan.</p><a class="btn btn-primary mt-16" href="#/produk">Kembali ke Produk</a></div>`;
    qs("#relatedProducts") && renderProductGrid("#relatedProducts", []);
    return;
  }
  const finalPrice = getFinalPrice(product);
  const outOfStock = product.stock <= 0;
  wrap.innerHTML = `
    <div class="product-detail">
      <div class="product-detail__media"><img src="${product.image}" alt="${product.name}" width="600" height="600"></div>
      <div>
        <span class="product-detail__cat">${categoryName(product.category)}</span>
        <h1 class="product-detail__name">${product.name}</h1>
        <div class="product-detail__meta">
          <span>⭐ ${product.rating.toFixed(1)}</span>
          <span class="text-muted">· Terjual ${product.sold}</span>
          <span class="product-card__stock ${product.stock <= 5 ? "low" : ""}">${outOfStock ? "Stok habis" : `Stok: ${product.stock}`}</span>
        </div>
        <div class="product-detail__price">
          <span>${formatRupiah(finalPrice)}</span>
          ${product.discount ? `<span class="original">${formatRupiah(product.price)}</span><span class="badge badge-discount">-${product.discount}%</span>` : ""}
        </div>
        <p class="product-detail__desc">${product.name} berkualitas pilihan, dikemas rapi dan dikirim segar langsung dari mitra terpercaya TopMarket. Cocok untuk kebutuhan harian keluarga Anda dengan harga yang bersahabat.</p>
        <div class="qty-selector">
          <button type="button" id="qtyMinus" aria-label="Kurangi">−</button>
          <input type="number" id="qtyInput" value="1" min="1" max="${product.stock || 1}" aria-label="Jumlah">
          <button type="button" id="qtyPlus" aria-label="Tambah">+</button>
        </div>
        <div class="product-detail__actions">
          <button class="btn btn-primary" id="addToCartBtn" ${outOfStock ? "disabled" : ""}>${outOfStock ? "Stok Habis" : "Tambah ke Keranjang"}</button>
          <button class="btn btn-outline" data-wishlist-toggle="${product.id}">${isInWishlist(product.id) ? "❤️ Wishlist" : "🤍 Wishlist"}</button>
        </div>
      </div>
    </div>`;

  const qtyInput = qs("#qtyInput");
  qs("#qtyMinus").addEventListener("click", () => { qtyInput.value = Math.max(1, Number(qtyInput.value) - 1); });
  qs("#qtyPlus").addEventListener("click", () => { qtyInput.value = Math.min(Number(qtyInput.max) || 99, Number(qtyInput.value) + 1); });
  qs("#addToCartBtn")?.addEventListener("click", () => addToCart(product.id, Number(qtyInput.value) || 1));

  const related = PRODUCTS.filter((p) => p.category === product.category && p.id !== product.id).slice(0, 4);
  renderProductGrid("#relatedProducts", related);
}

function afterRenderCart() {
  function render() {
    const items = getCartDetailed();
    const listEl = qs("#cartList");
    const summaryEl = qs("#cartSummaryBody");
    const emptyEl = qs("#cartEmpty");
    const contentEl = qs("#cartContent");

    if (!items.length) {
      contentEl.style.display = "none";
      emptyEl.style.display = "block";
      return;
    }
    contentEl.style.display = "grid";
    emptyEl.style.display = "none";

    listEl.innerHTML = items.map((item) => `
      <div class="cart-item" data-id="${item.id}">
        <div class="cart-item__media"><img src="${item.image}" alt="${item.name}" width="72" height="72"></div>
        <div>
          <div class="cart-item__name">${item.name}</div>
          <div class="cart-item__price">${formatRupiah(item.finalPrice)} / item</div>
          <div class="cart-item__row">
            <div class="qty-selector">
              <button type="button" data-qty-minus="${item.id}" aria-label="Kurangi">−</button>
              <input type="number" value="${item.qty}" min="1" data-qty-input="${item.id}" aria-label="Jumlah">
              <button type="button" data-qty-plus="${item.id}" aria-label="Tambah">+</button>
            </div>
            <span class="cart-item__subtotal">${formatRupiah(item.subtotal)}</span>
          </div>
          <button class="cart-item__remove mt-8" data-remove="${item.id}">Hapus</button>
        </div>
      </div>`).join("");

    const total = getCartTotal();
    summaryEl.innerHTML = `
      <div class="summary-row"><span>Subtotal (${getCartCount()} item)</span><span>${formatRupiah(total)}</span></div>
      <div class="summary-row"><span>Ongkos Kirim</span><span>Dihitung saat checkout</span></div>
      <div class="summary-row total"><span>Total</span><span>${formatRupiah(total)}</span></div>`;
  }

  qs("#cartList").addEventListener("click", (e) => {
    const minus = e.target.closest("[data-qty-minus]");
    const plus = e.target.closest("[data-qty-plus]");
    const remove = e.target.closest("[data-remove]");
    if (minus) { const id = Number(minus.dataset.qtyMinus); const item = getCartDetailed().find((i) => i.id === id); updateCartQty(id, (item?.qty || 1) - 1); render(); }
    if (plus) { const id = Number(plus.dataset.qtyPlus); const item = getCartDetailed().find((i) => i.id === id); updateCartQty(id, (item?.qty || 0) + 1); render(); }
    if (remove) { updateCartQty(Number(remove.dataset.remove), 0); render(); }
  });
  qs("#cartList").addEventListener("change", (e) => {
    const input = e.target.closest("[data-qty-input]");
    if (input) { updateCartQty(Number(input.dataset.qtyInput), Math.max(1, Number(input.value) || 1)); render(); }
  });

  render();
}

            <button type="submit" class="btn btn-primary btn-block">Kirim Pesan</button>
          </form>
        </div>
      </div>
    </section>`;
}

function afterRenderKontak() {
  qs("#contactForm").addEventListener("submit", (e) => {
    e.preventDefault();
    showToast("Pesan terkirim, tim kami akan segera menghubungi Anda");
    e.target.reset();
  });
}

/* ===================== Router ===================== */
const routes = {
  "/": { page: "home", render: renderHome, after: afterRenderHome },
  "/produk": { page: "produk", render: renderProdukPage, after: afterRenderProduk },
  "/produk-detail": { page: "produk-detail", render: renderProdukDetail, after: afterRenderDetail },
  "/keranjang": { page: "keranjang", render: renderKeranjang, after: afterRenderCart },
  "/checkout": { page: "checkout", render: renderCheckout, after: afterRenderCheckout },
  "/tentang": { page: "tentang", render: renderTentang, after: null },
  "/kontak": { page: "kontak", render: renderKontak, after: afterRenderKontak },
};

function parseHash() {
  const raw = location.hash.slice(1) || "/";
  const [path, queryString] = raw.split("?");
  return { path: path || "/", params: new URLSearchParams(queryString || "") };
}

function router() {
  const { path, params } = parseHash();
  const route = routes[path] || routes["/"];
  qs("#siteHeader").innerHTML = headerHTML(route.page);
  qs("#appView").innerHTML = route.render(params);
  route.after?.(params);
  updateCartBadge();
  updateWishlistBadge();
  window.scrollTo({ top: 0, behavior: "instant" });
}

/* ===================== Delegasi Event Global ===================== */
document.addEventListener("click", (e) => {
  const addBtn = e.target.closest("[data-add-to-cart]");
  if (addBtn && !addBtn.disabled) addToCart(Number(addBtn.dataset.addToCart));

  const wishBtn = e.target.closest("[data-wishlist-toggle]");
  if (wishBtn) {
    const id = Number(wishBtn.dataset.wishlistToggle);
    toggleWishlist(id);
    wishBtn.textContent = isInWishlist(id) ? "❤️" : "🤍";
  }

  const loginBtn = e.target.closest("[data-login-btn]");
  if (loginBtn) { e.preventDefault(); showToast("Fitur login akan segera hadir"); }

  const menuToggle = e.target.closest(".mobile-menu-toggle");
  if (menuToggle) qs(".mobile-drawer")?.classList.add("is-open");

  const drawerClose = e.target.closest(".mobile-drawer__close, .mobile-drawer__overlay");
  if (drawerClose) qs(".mobile-drawer")?.classList.remove("is-open");

  if (e.target.closest(".mobile-drawer__panel a")) qs(".mobile-drawer")?.classList.remove("is-open");

  const searchToggle = e.target.closest(".mobile-search-toggle");
  if (searchToggle) qs(".mobile-search")?.classList.toggle("is-open");
});

document.addEventListener("submit", (e) => {
  if (e.target.matches("[data-search-form]")) {
    e.preventDefault();
    const value = qs("input", e.target).value.trim();
    location.hash = value ? `/produk?search=${encodeURIComponent(value)}` : "/produk";
  }
});

window.addEventListener("hashchange", router);
document.addEventListener("DOMContentLoaded", () => {
  qs("#siteFooter").innerHTML = footerHTML();
  router();
});

</script>
</body>
</html>
